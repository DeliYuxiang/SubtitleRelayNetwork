name: Deploy SRN Cloudless Relay

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
    paths:
      - 'worker/**'
      - '.github/workflows/deploy.yml'

jobs:
  lint-format:
    runs-on: ubuntu-latest
    name: Code Check & Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd worker
          rm -rf node_modules package-lock.json
          npm install

      - name: Format Check
        run: cd worker && npm run format:check

      - name: Run Tests
        run: cd worker && npm test -- --run

  deploy-or-bootstrap:
    needs: [lint-format]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    name: Cloudflare Lifecycle
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd worker
          rm -rf node_modules package-lock.json
          npm install

      - name: Check for Infrastructure Secrets
        id: check_secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.SRN_D1_ID }}" ]           && MISSING+=("SRN_D1_ID")
          [ -z "${{ secrets.SRN_D1_NAME }}" ]         && MISSING+=("SRN_D1_NAME")
          [ -z "${{ secrets.SRN_R2_NAME }}" ]         && MISSING+=("SRN_R2_NAME")
          [ -z "${{ secrets.SRN_BACKUP_R2_NAME }}" ]  && MISSING+=("SRN_BACKUP_R2_NAME")
          [ -z "${{ secrets.RELAY_PRIVATE_KEY }}" ]   && MISSING+=("RELAY_PRIVATE_KEY")
          [ -z "${{ secrets.RELAY_PUBLIC_KEY }}" ]    && MISSING+=("RELAY_PUBLIC_KEY")

          if [ ${#MISSING[@]} -eq 0 ]; then
            echo "mode=deploy" >> $GITHUB_OUTPUT
          elif [ ${#MISSING[@]} -eq 6 ]; then
            echo "mode=bootstrap" >> $GITHUB_OUTPUT
          else
            echo "::error::Partial infrastructure secrets detected. Missing: ${MISSING[*]}"
            exit 1
          fi

      # --- MODE A: Deploy ---
      - name: Production Deployment
        id: prod_deploy
        if: steps.check_secrets.outputs.mode == 'deploy'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELAY_PRIVATE_KEY: ${{ secrets.RELAY_PRIVATE_KEY }}
          RELAY_PUBLIC_KEY: ${{ secrets.RELAY_PUBLIC_KEY }}
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          WRANGLER_NON_INTERACTIVE: "true"
        run: |
          cd worker
          sed -i "s/srn-d1-name-placeholder/${{ secrets.SRN_D1_NAME }}/g" wrangler.jsonc
          sed -i "s/srn-d1-id-placeholder/${{ secrets.SRN_D1_ID }}/g" wrangler.jsonc
          sed -i "s/srn-r2-name-placeholder/${{ secrets.SRN_R2_NAME }}/g" wrangler.jsonc
          sed -i "s/srn-backup-r2-name-placeholder/${{ secrets.SRN_BACKUP_R2_NAME }}/g" wrangler.jsonc
          
          # Dynamic Rate Limits (from GitHub Variables)
          SEARCH_LIMIT=${{ vars.SRN_SEARCH_LIMIT || 3 }}
          DEFAULT_LIMIT=${{ vars.SRN_DEFAULT_LIMIT || 999 }}
          CONTENT_LIMIT=${{ vars.SRN_CONTENT_LIMIT || 6 }}
          sed -i "s/srn-search-limit-placeholder/$SEARCH_LIMIT/g" wrangler.jsonc
          sed -i "s/srn-default-limit-placeholder/$DEFAULT_LIMIT/g" wrangler.jsonc
          sed -i "s/srn-content-limit-placeholder/$CONTENT_LIMIT/g" wrangler.jsonc

          # Auth policy vars (GitHub Actions variables)
          sed -i "s|srn-pubkey-whitelist-placeholder|${{ vars.SRN_PUBKEY_WHITELIST }}|g" wrangler.jsonc
          sed -i "s|srn-pow-difficulty-placeholder|${{ vars.SRN_POW_DIFFICULTY || '0' }}|g" wrangler.jsonc
          
          # Generate a random PoW secret for this deployment
          SRN_RANDOM_POW_SECRET=$(openssl rand -hex 16)
          sed -i "s|srn-pow-secret-placeholder|$SRN_RANDOM_POW_SECRET|g" wrangler.jsonc

          # 0. SECRETS: Apply sensitive keys to Cloudflare Worker
          printf '%s' "$RELAY_PRIVATE_KEY" | npx wrangler secret put RELAY_PRIVATE_KEY

          # Ensure backup bucket has a lifecycle rule (best-effort — non-blocking)
          BACKUP_RETENTION=${{ vars.SRN_BACKUP_RETENTION_DAYS || 90 }}
          npx wrangler r2 bucket lifecycle add ${{ secrets.SRN_BACKUP_R2_NAME }} \
            --id "expire-old-backups" \
            --expire-days $BACKUP_RETENTION \
            || echo "::warning::Lifecycle rule update failed (check API token R2 permissions) — continuing deployment"
          if [ -n "$TMDB_TOKEN" ]; then
            printf '%s' "$TMDB_TOKEN" | npx wrangler secret put TMDB_TOKEN
          fi

          # 1. STOP: Query live SHA, then enable Maintenance Mode
          # The live worker exposes its baked-in COMMIT_SHA via /v1/identity
          WORKERS_SUBDOMAIN=$(curl -sf "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/subdomain" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" | jq -r '.result.subdomain')
          LIVE_URL="https://srn-worker.${WORKERS_SUBDOMAIN}.workers.dev"
          SHORT_SHA=$(curl -sf "$LIVE_URL/v1/identity" | jq -r '.commit // empty')
          if [ -z "$SHORT_SHA" ] || [ "$SHORT_SHA" = "unknown" ]; then
            SHORT_SHA="initial"
          fi
          echo "::notice::Currently deployed SHA: $SHORT_SHA"

          HEAD_SHA=$(git rev-parse --short HEAD)
          if [ "$SHORT_SHA" = "$HEAD_SHA" ]; then
            echo "::notice::Live worker already at ${HEAD_SHA} — skipping backup and deploy."
            exit 0
          fi

          echo "::notice::Enabling Maintenance Mode before backup..."
          npx wrangler deploy --var MAINTENANCE_MODE:true --var COMMIT_SHA:$SHORT_SHA

          # 2. BACKUP: Backup D1, named after the currently deployed SHA
          BACKUP_FILE="backup-$(date +%Y%m%d-%H%M%S)-$SHORT_SHA.sql"
          echo "::notice::Backing up D1 to R2: $BACKUP_FILE"
          npx wrangler d1 export ${{ secrets.SRN_D1_NAME }} --remote --output "$BACKUP_FILE"
          
          # Calculate local MD5
          LOCAL_MD5=$(md5sum "$BACKUP_FILE" | awk '{ print $1 }')
          echo "Local MD5: $LOCAL_MD5"

          # Force remote upload
          npx wrangler r2 object put "${{ secrets.SRN_BACKUP_R2_NAME }}/$BACKUP_FILE" --file "$BACKUP_FILE" --remote

          # 2.1 Verification (Foolproof MD5 Check)
          echo "::notice::Verifying R2 upload integrity..."
          npx wrangler r2 object get "${{ secrets.SRN_BACKUP_R2_NAME }}/$BACKUP_FILE" --file "verify_$BACKUP_FILE" --remote
          REMOTE_MD5=$(md5sum "verify_$BACKUP_FILE" | awk '{ print $1 }')
          rm "verify_$BACKUP_FILE"

          if [ "$LOCAL_MD5" == "$REMOTE_MD5" ]; then
            echo "::notice::Integrity check passed (MD5: $LOCAL_MD5)"
          else
            echo "::error::MD5 Mismatch! Local: $LOCAL_MD5, Remote: $REMOTE_MD5. Backup might be corrupted."
            exit 1
          fi

          rm "$BACKUP_FILE"

          # 3. MIGRATE: Apply database migrations
          npx wrangler d1 migrations apply ${{ secrets.SRN_D1_NAME }} --remote
          
          # 4. DEPLOY: Production Deployment (bakes SHA + relay pubkey, implicitly clears MAINTENANCE_MODE)
          DEPLOY_OUTPUT=$(npx wrangler deploy \
            --var COMMIT_SHA:$(git rev-parse --short HEAD) \
            --var RELAY_PUBLIC_KEY:"$RELAY_PUBLIC_KEY")
          echo "$DEPLOY_OUTPUT"

          DEPLOYED_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE "https://[a-zA-Z0-9.-]+\.workers\.dev" | head -n 1)
          echo "deployed_url=$DEPLOYED_URL" >> $GITHUB_OUTPUT

          git ls-remote --heads origin "refs/heads/infra/provision-*" | awk '{print $2}' | sed 's|refs/heads/||' | while read branch; do
            git push origin --delete $branch || true
          done

      - name: Emergency Restore (Disable Maintenance Mode)
        if: failure() && steps.check_secrets.outputs.mode == 'deploy'
        run: |
          cd worker
          sed -i "s/srn-d1-name-placeholder/${{ secrets.SRN_D1_NAME }}/g" wrangler.jsonc
          sed -i "s/srn-d1-id-placeholder/${{ secrets.SRN_D1_ID }}/g" wrangler.jsonc
          sed -i "s/srn-r2-name-placeholder/${{ secrets.SRN_R2_NAME }}/g" wrangler.jsonc
          sed -i "s/srn-backup-r2-name-placeholder/${{ secrets.SRN_BACKUP_R2_NAME }}/g" wrangler.jsonc
          
          # Dynamic Rate Limits (from GitHub Variables)
          SEARCH_LIMIT=${{ vars.SRN_SEARCH_LIMIT || 3 }}
          DEFAULT_LIMIT=${{ vars.SRN_DEFAULT_LIMIT || 999 }}
          CONTENT_LIMIT=${{ vars.SRN_CONTENT_LIMIT || 6 }}
          sed -i "s/srn-search-limit-placeholder/$SEARCH_LIMIT/g" wrangler.jsonc
          sed -i "s/srn-default-limit-placeholder/$DEFAULT_LIMIT/g" wrangler.jsonc
          sed -i "s/srn-content-limit-placeholder/$CONTENT_LIMIT/g" wrangler.jsonc
          sed -i "s|srn-pubkey-whitelist-placeholder|${{ vars.SRN_PUBKEY_WHITELIST }}|g" wrangler.jsonc
          sed -i "s|srn-pow-difficulty-placeholder|${{ vars.SRN_POW_DIFFICULTY || '0' }}|g" wrangler.jsonc
          
          # Generate a random PoW secret for emergency restore
          SRN_RANDOM_POW_SECRET=$(openssl rand -hex 16)
          sed -i "s|srn-pow-secret-placeholder|$SRN_RANDOM_POW_SECRET|g" wrangler.jsonc

          echo "::warning::Deployment failed. Forcing maintenance mode OFF..."
          npx wrangler deploy --var MAINTENANCE_MODE:false
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WRANGLER_NON_INTERACTIVE: "true"

      # --- MODE B: Bootstrap ---
      - name: Setup Go (Bootstrap)
        if: steps.check_secrets.outputs.mode == 'bootstrap'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Infrastructure Bootstrap
        if: steps.check_secrets.outputs.mode == 'bootstrap'
        run: |
          cd worker
          TS=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="infra/provision-$TS"
          git checkout -b $BRANCH_NAME
          
          DB_NAME="srn-db-$TS"
          R2_NAME="srn-assets-$TS"
          BACKUP_R2_NAME="srn-backup-$TS"
          
          npx wrangler r2 bucket create $R2_NAME &>/dev/null || true
          npx wrangler r2 bucket create $BACKUP_R2_NAME &>/dev/null || true
          npx wrangler d1 create $DB_NAME &>/dev/null || true

          # Set backup retention lifecycle rule (best-effort — non-blocking)
          BACKUP_RETENTION=${{ vars.SRN_BACKUP_RETENTION_DAYS || 90 }}
          npx wrangler r2 bucket lifecycle add $BACKUP_R2_NAME \
            --id "expire-old-backups" \
            --expire-days $BACKUP_RETENTION \
            || echo "::warning::Lifecycle rule update failed (check API token R2 permissions) — continuing bootstrap"
          
          D1_ID=$(npx wrangler d1 list 2>/dev/null | grep "$DB_NAME" | grep -oE "[0-9a-f]{8}-([0-9a-f]{4}-){3}[0-9a-f]{12}" | head -n 1)
          if [ -z "$D1_ID" ]; then exit 1; fi
          
          echo "::add-mask::$D1_ID"
          sed -i "s/srn-d1-name-placeholder/$DB_NAME/g" wrangler.jsonc
          sed -i "s/srn-d1-id-placeholder/$D1_ID/g" wrangler.jsonc
          sed -i "s/srn-r2-name-placeholder/$R2_NAME/g" wrangler.jsonc
          sed -i "s/srn-backup-r2-name-placeholder/$BACKUP_R2_NAME/g" wrangler.jsonc
          
          # Defaults for bootstrap
          sed -i "s/srn-search-limit-placeholder/3/g" wrangler.jsonc
          sed -i "s/srn-default-limit-placeholder/999/g" wrangler.jsonc
          sed -i "s/srn-content-limit-placeholder/6/g" wrangler.jsonc
          sed -i "s|srn-pubkey-whitelist-placeholder||g" wrangler.jsonc
          sed -i "s|srn-pow-difficulty-placeholder|0|g" wrangler.jsonc
          SRN_RANDOM_POW_SECRET=$(openssl rand -hex 16)
          sed -i "s|srn-pow-secret-placeholder|$SRN_RANDOM_POW_SECRET|g" wrangler.jsonc

          npx wrangler d1 migrations apply $DB_NAME --remote

          # Generate relay Ed25519 keypair via Node.js
          KEYGEN_OUTPUT=$(node -e "
            const { generateKeyPairSync } = require('crypto');
            const { privateKey, publicKey } = generateKeyPairSync('ed25519');
            const privHex = privateKey.export({ type: 'pkcs8', format: 'der' }).slice(16).toString('hex');
            const pubHex = publicKey.export({ type: 'spki', format: 'der' }).slice(12).toString('hex');
            console.log('Public Key (hex): ' + pubHex);
            console.log('Private Key (hex): ' + privHex);
          ")
          NEW_RELAY_PUBKEY=$(echo "$KEYGEN_OUTPUT" | grep "Public Key (hex):" | awk '{print $4}')
          NEW_RELAY_PRIVKEY=$(echo "$KEYGEN_OUTPUT" | grep "Private Key (hex):" | awk '{print $4}')

          # Print BOTH keys BEFORE masking — this is the only time they are visible.
          # ACTION REQUIRED: add both values as GitHub Secrets.
          echo "::notice::=== RELAY KEYPAIR GENERATED ==="
          echo "::notice::RELAY_PUBLIC_KEY  (add as GitHub Secret): $NEW_RELAY_PUBKEY"
          echo "::notice::RELAY_PRIVATE_KEY (add as GitHub Secret): $NEW_RELAY_PRIVKEY"
          echo "::notice::==================================="
          echo "::add-mask::$NEW_RELAY_PRIVKEY"

          # Apply private key to Cloudflare Worker Secrets now so the Worker works after merge
          printf '%s' "$NEW_RELAY_PRIVKEY" | npx wrangler secret put RELAY_PRIVATE_KEY

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wrangler.jsonc
          git commit -m "infra: provisioning $DB_NAME, $R2_NAME, $BACKUP_R2_NAME and relay keypair"
          git push origin $BRANCH_NAME

          echo "::notice::Infrastructure provisioned on '$BRANCH_NAME'. Merge branch, then add GitHub Secrets: SRN_D1_ID=$D1_ID  SRN_D1_NAME=$DB_NAME  SRN_R2_NAME=$R2_NAME  SRN_BACKUP_R2_NAME=$BACKUP_R2_NAME  RELAY_PUBLIC_KEY=<see notice above>  RELAY_PRIVATE_KEY=<see notice above>"
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WRANGLER_NON_INTERACTIVE: "true"

      # --- MODE C: Final Sync (Docs) ---
      - name: Update Registry (README & RELAYS)
        if: success() && steps.check_secrets.outputs.mode == 'deploy' && github.ref_name == 'main'
        run: |
          DEPLOYED_URL="${{ steps.prod_deploy.outputs.deployed_url }}"
          if [ -n "$DEPLOYED_URL" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git reset --hard
            git pull --rebase origin main
            
            sed -i "s|\[pending deployment\]|$DEPLOYED_URL|g" README.md
            sed -i "/## 原初中继/,/## 社区中继/s|\[pending deployment\]|$DEPLOYED_URL|g" RELAYS.md
            
            git add README.md RELAYS.md
            git commit -m "docs: sync live relay registry [skip ci]" || echo "No changes"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
