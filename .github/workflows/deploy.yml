name: Deploy SRN Cloudless Relay

# Runs on main-branch pushes only.
# PR checks and preview deploys are handled by pr.yml.
on:
  push:
    branches:
      - main
    paths:
      - 'worker/**'
      - '.github/workflows/deploy.yml'

# ---------------------------------------------------------------------------
# Job dependency graph (deploy mode only):
#
#   lint-format
#       │
#   resolve-infra  ← reads Terraform state, surfaces resource IDs
#       │
#   deploy-or-bootstrap  ← maintenance ON + backup + SQL migrations apply
#       │
#   run-data-migrations  ← discovers migrations/*.mjs, runs each
#       │
#   finalize-deploy      ← wrangler deploy (maintenance OFF) + registry update
#
#   emergency-restore    ← runs on failure of any of the three deploy jobs
# ---------------------------------------------------------------------------

jobs:
  lint-format:
    runs-on: ubuntu-latest
    name: Code Check & Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd worker
          npm ci

      - name: Format Check
        run: cd worker && npm run format:check

      - name: Run Tests
        run: cd worker && npm test -- --run

  # -------------------------------------------------------------------------
  # Resolve production resource IDs from Terraform state.
  # infra_exists=false → bootstrap mode (no resources yet).
  # -------------------------------------------------------------------------
  resolve-infra:
    needs: [lint-format]
    uses: ./.github/workflows/resolve-infra.yml
    secrets: inherit
    with:
      environment: production

  # -------------------------------------------------------------------------
  # Phase 1: Enable maintenance mode, backup D1, apply SQL schema migrations.
  # Also handles the bootstrap path (MODE B) when no infra exists yet.
  # -------------------------------------------------------------------------
  deploy-or-bootstrap:
    needs: [lint-format, resolve-infra]
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    name: Cloudflare Lifecycle
    permissions:
      contents: write
    outputs:
      mode: ${{ steps.check_mode.outputs.mode }}
      skip: ${{ steps.pre_deploy.outputs.skip }}
      backup_file: ${{ steps.pre_deploy.outputs.backup_file }}
    env:
      SRN_D1_NAME:        ${{ needs.resolve-infra.outputs.d1_name }}
      SRN_D1_ID:          ${{ needs.resolve-infra.outputs.d1_id }}
      SRN_R2_NAME:        ${{ needs.resolve-infra.outputs.r2_name }}
      SRN_BACKUP_R2_NAME: ${{ needs.resolve-infra.outputs.backup_r2_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
        run: |
          MISSING=()
          [ -z "$CLOUDFLARE_API_TOKEN"  ] && MISSING+=("CLOUDFLARE_API_TOKEN")
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && MISSING+=("CLOUDFLARE_ACCOUNT_ID")
          [ -z "$TMDB_TOKEN"            ] && MISSING+=("TMDB_TOKEN")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd worker
          npm ci

      - name: Determine Deploy Mode
        id: check_mode
        run: |
          INFRA_EXISTS="${{ needs.resolve-infra.outputs.infra_exists }}"
          MISSING_KEYS=()
          [ -z "${{ secrets.RELAY_PRIVATE_KEY }}" ] && MISSING_KEYS+=("RELAY_PRIVATE_KEY")
          [ -z "${{ secrets.RELAY_PUBLIC_KEY }}" ]  && MISSING_KEYS+=("RELAY_PUBLIC_KEY")

          if [ "$INFRA_EXISTS" = "true" ] && [ ${#MISSING_KEYS[@]} -eq 0 ]; then
            echo "mode=deploy" >> $GITHUB_OUTPUT
          elif [ "$INFRA_EXISTS" = "false" ] && [ ${#MISSING_KEYS[@]} -eq 2 ]; then
            echo "mode=bootstrap" >> $GITHUB_OUTPUT
          elif [ "$INFRA_EXISTS" = "true" ] && [ ${#MISSING_KEYS[@]} -gt 0 ]; then
            echo "::error::Infrastructure exists in Terraform state but relay keypair secrets are missing: ${MISSING_KEYS[*]}"
            exit 1
          else
            echo "::error::No infrastructure in Terraform state but some relay secrets are already set. Run 'terraform import' to adopt existing resources."
            exit 1
          fi

      # --- MODE A: Deploy ---

      - name: Generate wrangler production config
        if: steps.check_mode.outputs.mode == 'deploy'
        run: |
          SRN_POW_SECRET=$(openssl rand -hex 16) \
            .github/workflows/scripts/generate_wrangler_config.sh worker/wrangler.production.jsonc
        env:
          SRN_PUBKEY_WHITELIST: ${{ vars.SRN_PUBKEY_WHITELIST }}
          SRN_POW_DIFFICULTY: ${{ vars.SRN_POW_DIFFICULTY || '0' }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          WRANGLER_NON_INTERACTIVE: "true"

      - name: Upload Secrets & Configure Lifecycle Rules
        if: steps.check_mode.outputs.mode == 'deploy'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RELAY_PRIVATE_KEY: ${{ secrets.RELAY_PRIVATE_KEY }}
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          WRANGLER_NON_INTERACTIVE: "true"
        run: |
          cd worker
          printf '%s' "$RELAY_PRIVATE_KEY" | npx wrangler secret put RELAY_PRIVATE_KEY

          BACKUP_RETENTION=${{ vars.SRN_BACKUP_RETENTION_DAYS || 90 }}
          npx wrangler r2 bucket lifecycle remove "$SRN_BACKUP_R2_NAME" \
            --id "expire-old-backups" 2>/dev/null || true
          npx wrangler r2 bucket lifecycle add "$SRN_BACKUP_R2_NAME" \
            --id "expire-old-backups" \
            --expire-days $BACKUP_RETENTION \
            || echo "::warning::Lifecycle rule update failed (check API token R2 permissions) — continuing deployment"

          if [ -n "$TMDB_TOKEN" ]; then
            printf '%s' "$TMDB_TOKEN" | npx wrangler secret put TMDB_TOKEN
          fi

      - name: Maintenance Mode ON + Backup + SQL Migrations
        id: pre_deploy
        if: steps.check_mode.outputs.mode == 'deploy'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_NON_INTERACTIVE: "true"
        run: |
          cd worker

          # 1. Read previously deployed SHA and URL from R2 (written by Deploy Worker step)
          npx wrangler r2 object get "$SRN_BACKUP_R2_NAME/deployed-sha.txt" --file /tmp/deployed_sha.txt 2>/dev/null || true
          SHORT_SHA=$(cat /tmp/deployed_sha.txt 2>/dev/null | tr -d '[:space:]')
          if [ -z "$SHORT_SHA" ]; then
            SHORT_SHA="initial"
          fi
          echo "::notice::Currently deployed SHA: $SHORT_SHA"

          # 1b. Check if server is already in maintenance mode.
          npx wrangler r2 object get "$SRN_BACKUP_R2_NAME/deployed-url.txt" --file /tmp/deployed_url.txt 2>/dev/null || true
          LIVE_URL=$(cat /tmp/deployed_url.txt 2>/dev/null | tr -d '[:space:]')
          if [ -n "$LIVE_URL" ]; then
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$LIVE_URL/v1/health" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "503" ]; then
              echo "::error::Server is already in maintenance mode (HTTP 503). The previous deploy cycle may have crashed before rollback completed. Resolve manually before re-deploying."
              exit 1
            fi
            echo "::notice::Server status: HTTP $HTTP_STATUS — proceeding."
          fi

          HEAD_SHA=$(git rev-parse --short HEAD)
          if [ "$SHORT_SHA" = "$HEAD_SHA" ]; then
            echo "::notice::Live worker already at ${HEAD_SHA} — skipping backup and deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

          # 2. Enable Maintenance Mode
          echo "::notice::Enabling Maintenance Mode before backup..."
          npx wrangler deploy --config wrangler.production.jsonc --var MAINTENANCE_MODE:true --var COMMIT_SHA:$SHORT_SHA

          # 3. Backup D1, named after the currently deployed SHA
          BACKUP_FILE="backup-$(date +%Y%m%d-%H%M%S)-$SHORT_SHA.sql"
          echo "::notice::Backing up D1 to R2: $BACKUP_FILE"
          npx wrangler d1 export "$SRN_D1_NAME" --remote --output "$BACKUP_FILE"

          LOCAL_MD5=$(md5sum "$BACKUP_FILE" | awk '{ print $1 }')
          echo "Local MD5: $LOCAL_MD5"
          npx wrangler r2 object put "$SRN_BACKUP_R2_NAME/$BACKUP_FILE" --file "$BACKUP_FILE" --remote
          echo "backup_file=$BACKUP_FILE" >> $GITHUB_OUTPUT

          echo "::notice::Verifying R2 upload integrity..."
          npx wrangler r2 object get "$SRN_BACKUP_R2_NAME/$BACKUP_FILE" --file "verify_$BACKUP_FILE" --remote
          REMOTE_MD5=$(md5sum "verify_$BACKUP_FILE" | awk '{ print $1 }')
          rm "verify_$BACKUP_FILE"

          if [ "$LOCAL_MD5" == "$REMOTE_MD5" ]; then
            echo "::notice::Integrity check passed (MD5: $LOCAL_MD5)"
          else
            echo "::error::MD5 Mismatch! Local: $LOCAL_MD5, Remote: $REMOTE_MD5. Backup might be corrupted."
            exit 1
          fi

          # 4. Apply SQL schema migrations
          npx wrangler d1 migrations apply "$SRN_D1_NAME" --remote --config wrangler.production.jsonc

      - name: Upload Backup Artifact
        if: steps.pre_deploy.outputs.backup_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: d1-backup
          path: worker/${{ steps.pre_deploy.outputs.backup_file }}
          retention-days: 1

      # --- MODE B: Bootstrap ---
      - name: Setup Go (Bootstrap)
        if: steps.check_mode.outputs.mode == 'bootstrap'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Infrastructure Bootstrap
        if: steps.check_mode.outputs.mode == 'bootstrap'
        run: |
          cd worker
          TS=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="infra/provision-$TS"
          git checkout -b $BRANCH_NAME

          DB_NAME="srn-db-$TS"
          R2_NAME="srn-assets-$TS"
          BACKUP_R2_NAME="srn-backup-$TS"

          npx wrangler r2 bucket create $R2_NAME &>/dev/null || true
          npx wrangler r2 bucket create $BACKUP_R2_NAME &>/dev/null || true
          npx wrangler d1 create $DB_NAME &>/dev/null || true

          BACKUP_RETENTION=${{ vars.SRN_BACKUP_RETENTION_DAYS || 90 }}
          npx wrangler r2 bucket lifecycle remove $BACKUP_R2_NAME \
            --id "expire-old-backups" 2>/dev/null || true
          npx wrangler r2 bucket lifecycle add $BACKUP_R2_NAME \
            --id "expire-old-backups" \
            --expire-days $BACKUP_RETENTION \
            || echo "::warning::Lifecycle rule update failed — continuing bootstrap"

          D1_ID=$(npx wrangler d1 list 2>/dev/null | grep "$DB_NAME" | grep -oE "[0-9a-f]{8}-([0-9a-f]{4}-){3}[0-9a-f]{12}" | head -n 1)
          if [ -z "$D1_ID" ]; then exit 1; fi

          echo "::add-mask::$D1_ID"
          npx wrangler d1 migrations apply $DB_NAME --remote

          KEYGEN_OUTPUT=$(node -e "
            const { generateKeyPairSync } = require('crypto');
            const { privateKey, publicKey } = generateKeyPairSync('ed25519');
            const privHex = privateKey.export({ type: 'pkcs8', format: 'der' }).slice(16).toString('hex');
            const pubHex = publicKey.export({ type: 'spki', format: 'der' }).slice(12).toString('hex');
            console.log('Public Key (hex): ' + pubHex);
            console.log('Private Key (hex): ' + privHex);
          ")
          NEW_RELAY_PUBKEY=$(echo "$KEYGEN_OUTPUT" | grep "Public Key (hex):" | awk '{print $4}')
          NEW_RELAY_PRIVKEY=$(echo "$KEYGEN_OUTPUT" | grep "Private Key (hex):" | awk '{print $4}')

          echo "::notice::=== RELAY KEYPAIR GENERATED ==="
          echo "::notice::RELAY_PUBLIC_KEY  (add as GitHub Secret): $NEW_RELAY_PUBKEY"
          echo "::notice::RELAY_PRIVATE_KEY (add as GitHub Secret): $NEW_RELAY_PRIVKEY"
          echo "::notice::==================================="
          echo "::add-mask::$NEW_RELAY_PRIVKEY"

          printf '%s' "$NEW_RELAY_PRIVKEY" | npx wrangler secret put RELAY_PRIVATE_KEY

          {
            echo "# Infrastructure Provisioned"
            echo ""
            echo "Resources created by bootstrap on branch \`$BRANCH_NAME\`."
            echo ""
            echo "## Step 1: Add GitHub Secrets (keypair only)"
            echo ""
            echo "| Secret | Where to find the value |"
            echo "|--------|-------------------------|"
            echo "| RELAY_PUBLIC_KEY  | See CI notice output for this run |"
            echo "| RELAY_PRIVATE_KEY | See CI notice output for this run |"
            echo ""
            echo "## Step 2: Import resources into Terraform state"
            echo ""
            echo "Run these commands locally (replace ACCOUNT_ID with your Cloudflare account ID):"
            echo ""
            echo '```bash'
            echo "cd infra/terraform"
            echo "terraform init ...   # see terraform.yml for backend-config flags"
            echo "terraform import cloudflare_d1_database.production        ACCOUNT_ID/$D1_ID"
            echo "terraform import cloudflare_r2_bucket.production_assets   ACCOUNT_ID/$R2_NAME"
            echo "terraform import cloudflare_r2_bucket.production_backup   ACCOUNT_ID/$BACKUP_R2_NAME"
            echo '```'
            echo ""
            echo "Also set these GitHub Actions Variables (not Secrets) to match the provisioned names:"
            echo "- TF_PRODUCTION_D1_NAME = $DB_NAME"
            echo "- TF_PRODUCTION_R2_NAME = $R2_NAME"
            echo "- TF_PRODUCTION_BACKUP_R2_NAME = $BACKUP_R2_NAME"
            echo ""
            echo "Delete this file after completing both steps."
          } > PROVISION_INFO.md

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add PROVISION_INFO.md
          git commit -m "infra: provisioning $DB_NAME, $R2_NAME, $BACKUP_R2_NAME and relay keypair"
          git push origin $BRANCH_NAME

          echo "::notice::Bootstrap complete on '$BRANCH_NAME'. Add GitHub Secrets: RELAY_PUBLIC_KEY RELAY_PRIVATE_KEY — then run terraform import (see PROVISION_INFO.md)."
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WRANGLER_NON_INTERACTIVE: "true"

  # -------------------------------------------------------------------------
  # Phase 2: Run pending data migrations during the maintenance window.
  # -------------------------------------------------------------------------
  run-data-migrations:
    needs: [resolve-infra, deploy-or-bootstrap]
    if: |
      needs.deploy-or-bootstrap.result == 'success' &&
      needs.deploy-or-bootstrap.outputs.mode == 'deploy' &&
      needs.deploy-or-bootstrap.outputs.skip != 'true'
    uses: ./.github/workflows/run-migrations.yml
    secrets: inherit
    with:
      d1_id: ${{ needs.resolve-infra.outputs.d1_id }}
    permissions:
      contents: write

  # -------------------------------------------------------------------------
  # Phase 3: Deploy updated worker (implicitly disables maintenance mode).
  # -------------------------------------------------------------------------
  finalize-deploy:
    needs: [resolve-infra, deploy-or-bootstrap, run-data-migrations]
    if: |
      needs.deploy-or-bootstrap.result == 'success' &&
      needs.run-data-migrations.result == 'success' &&
      needs.deploy-or-bootstrap.outputs.mode == 'deploy' &&
      needs.deploy-or-bootstrap.outputs.skip != 'true'
    runs-on: ubuntu-latest
    name: Deploy Worker & Update Registry
    permissions:
      contents: write
    env:
      SRN_D1_NAME:        ${{ needs.resolve-infra.outputs.d1_name }}
      SRN_D1_ID:          ${{ needs.resolve-infra.outputs.d1_id }}
      SRN_R2_NAME:        ${{ needs.resolve-infra.outputs.r2_name }}
      SRN_BACKUP_R2_NAME: ${{ needs.resolve-infra.outputs.backup_r2_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd worker
          npm ci

      - name: Generate wrangler production config
        run: |
          SRN_POW_SECRET=$(openssl rand -hex 16) \
            .github/workflows/scripts/generate_wrangler_config.sh worker/wrangler.production.jsonc
        env:
          SRN_PUBKEY_WHITELIST: ${{ vars.SRN_PUBKEY_WHITELIST }}
          SRN_POW_DIFFICULTY: ${{ vars.SRN_POW_DIFFICULTY || '0' }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

      - name: Deploy Worker
        id: worker_deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RELAY_PUBLIC_KEY: ${{ secrets.RELAY_PUBLIC_KEY }}
          WRANGLER_NON_INTERACTIVE: "true"
        run: |
          cd worker
          SHORT_SHA=$(git rev-parse --short HEAD)
          DEPLOY_OUTPUT=$(npx wrangler deploy --config wrangler.production.jsonc \
            --var COMMIT_SHA:"$SHORT_SHA" \
            --var RELAY_PUBLIC_KEY:"$RELAY_PUBLIC_KEY")
          echo "$DEPLOY_OUTPUT"

          echo -n "$SHORT_SHA" > /tmp/deployed_sha.txt
          npx wrangler r2 object put "$SRN_BACKUP_R2_NAME/deployed-sha.txt" --file /tmp/deployed_sha.txt

          DEPLOYED_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE "https://[a-zA-Z0-9.-]+\.workers\.dev" | head -n 1)
          echo -n "$DEPLOYED_URL" > /tmp/deployed_url.txt
          npx wrangler r2 object put "$SRN_BACKUP_R2_NAME/deployed-url.txt" --file /tmp/deployed_url.txt
          echo "deployed_url=$DEPLOYED_URL" >> $GITHUB_OUTPUT

      - name: Cleanup provision branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git ls-remote --heads origin "refs/heads/infra/provision-*" | awk '{print $2}' | sed 's|refs/heads/||' | while read branch; do
            git push origin --delete "$branch" || true
          done

  # -------------------------------------------------------------------------
  # Emergency restore: fires if ANY of the three deploy phases fail.
  # -------------------------------------------------------------------------
  emergency-restore:
    needs: [resolve-infra, deploy-or-bootstrap, run-data-migrations, finalize-deploy]
    if: |
      failure() &&
      needs.deploy-or-bootstrap.outputs.mode == 'deploy' &&
      needs.deploy-or-bootstrap.outputs.skip != 'true'
    runs-on: ubuntu-latest
    name: Emergency Restore
    env:
      SRN_D1_NAME:        ${{ needs.resolve-infra.outputs.d1_name }}
      SRN_D1_ID:          ${{ needs.resolve-infra.outputs.d1_id }}
      SRN_R2_NAME:        ${{ needs.resolve-infra.outputs.r2_name }}
      SRN_BACKUP_R2_NAME: ${{ needs.resolve-infra.outputs.backup_r2_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd worker
          npm ci

      - name: Generate wrangler production config
        id: configure
        run: |
          SRN_POW_SECRET=$(openssl rand -hex 16) \
            .github/workflows/scripts/generate_wrangler_config.sh worker/wrangler.production.jsonc

          DOB_FAILED="${{ needs.deploy-or-bootstrap.result == 'failure' }}"
          DM_FAILED="${{ needs.run-data-migrations.result == 'failure' }}"
          if [ "$DOB_FAILED" = "true" ] || [ "$DM_FAILED" = "true" ]; then
            echo "db_touched=true" >> $GITHUB_OUTPUT
          else
            echo "db_touched=false" >> $GITHUB_OUTPUT
          fi
        env:
          SRN_PUBKEY_WHITELIST: ${{ vars.SRN_PUBKEY_WHITELIST }}
          SRN_POW_DIFFICULTY: ${{ vars.SRN_POW_DIFFICULTY || '0' }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          WRANGLER_NON_INTERACTIVE: "true"

      # --- Path A: DB was touched → restore from backup + rollback code ---
      - name: Download Backup Artifact
        id: artifact_download
        if: steps.configure.outputs.db_touched == 'true' && needs.deploy-or-bootstrap.outputs.backup_file != ''
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: d1-backup
          path: worker/

      - name: Restore Database from Pre-Deployment Backup
        if: steps.configure.outputs.db_touched == 'true' && needs.deploy-or-bootstrap.outputs.backup_file != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_NON_INTERACTIVE: "true"
        run: |
          BACKUP_FILE="${{ needs.deploy-or-bootstrap.outputs.backup_file }}"
          cd worker

          if [ "${{ steps.artifact_download.outcome }}" = "success" ] && [ -f "$BACKUP_FILE" ]; then
            echo "::notice::Using local artifact for restore: $BACKUP_FILE"
          else
            echo "::warning::Artifact unavailable — fetching backup from R2: $BACKUP_FILE"
            npx wrangler r2 object get "$SRN_BACKUP_R2_NAME/$BACKUP_FILE" \
              --file "$BACKUP_FILE" --remote --config wrangler.production.jsonc
          fi

          echo "::warning::Restoring D1 from backup: $BACKUP_FILE"
          npx wrangler d1 execute "$SRN_D1_NAME" \
            --remote --file="$BACKUP_FILE" --yes --config wrangler.production.jsonc
          echo "::notice::D1 database restored from $BACKUP_FILE"

      - name: Redeploy Previous Code Version
        if: steps.configure.outputs.db_touched == 'true' && needs.deploy-or-bootstrap.outputs.backup_file != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_NON_INTERACTIVE: "true"
        run: |
          BACKUP_FILE="${{ needs.deploy-or-bootstrap.outputs.backup_file }}"
          PREV_SHA=$(echo "$BACKUP_FILE" | grep -oE "[a-f0-9]{7}" | tail -n 1)
          if [ -z "$PREV_SHA" ]; then
            echo "::error::Could not extract SHA from backup filename '$BACKUP_FILE'. Falling back to maintenance-off deploy."
            cd worker && npx wrangler deploy --config wrangler.production.jsonc --var MAINTENANCE_MODE:false
            exit 0
          fi

          echo "::warning::Redeploying previous code version: $PREV_SHA"
          git checkout "$PREV_SHA"
          cd worker
          npm ci
          npx wrangler deploy --config wrangler.production.jsonc --var MAINTENANCE_MODE:false
          echo -n "$PREV_SHA" > /tmp/deployed_sha.txt
          npx wrangler r2 object put "$SRN_BACKUP_R2_NAME/deployed-sha.txt" --file /tmp/deployed_sha.txt
          echo "::notice::Emergency rollback complete — live at $PREV_SHA, DB restored from $BACKUP_FILE"

      # --- Path B: Only finalize-deploy failed → DB is clean, just turn maintenance off ---
      - name: Disable Maintenance Mode (no DB changes)
        if: steps.configure.outputs.db_touched == 'false'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_NON_INTERACTIVE: "true"
        run: |
          cd worker
          echo "::warning::Deployment failed after DB migration. Forcing maintenance mode OFF..."
          npx wrangler deploy --config wrangler.production.jsonc --var MAINTENANCE_MODE:false
