name: Deploy SRN Cloudless Relay

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
    paths:
      - 'worker/**'
      - '.github/workflows/deploy.yml'

jobs:
  lint-format:
    runs-on: ubuntu-latest
    name: Code Formatting
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 场景 1: 直接 Push - 信任代码，执行 Full Fix & Sync
      - name: Full Auto-Fix (On Push)
        if: github.event_name == 'push'
        run: |
          cd worker && npm install && npm run format:fix && cd ..
          if [ -n "$(git status --porcelain)" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            if [ "${{ github.ref_name }}" != "main" ]; then
              echo "Amending and force-pushing to ${{ github.ref_name }}..."
              git commit --amend --no-edit
              git push origin HEAD:${{ github.ref_name }} --force
            else
              echo "Main branch: Creating skip-ci commit..."
              git commit -m "$(git log -1 --pretty=%s) [skip ci]"
              git push origin main
            fi
          fi

      # 场景 2: Pull Request - 安全优先，仅执行 Read-only Check
      - name: Read-only Check (On PR)
        if: github.event_name == 'pull_request'
        run: npx prettier --check "worker/src/**/*.ts"

  deploy-or-bootstrap:
    needs: [lint-format]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    name: Cloudflare Lifecycle
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd worker && npm install

      - name: Check for Infrastructure Secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.SRN_D1_ID }}" ] && [ -n "${{ secrets.SRN_D1_NAME }}" ] && [ -n "${{ secrets.SRN_R2_NAME }}" ]; then
            echo "mode=deploy" >> $GITHUB_OUTPUT
          else
            echo "mode=bootstrap" >> $GITHUB_OUTPUT
          fi

      # --- MODE A: Deploy ---
      - name: Production Deployment
        id: prod_deploy
        if: steps.check_secrets.outputs.mode == 'deploy'
        run: |
          cd worker
          sed -i "s/srn-d1-name-placeholder/${{ secrets.SRN_D1_NAME }}/g" wrangler.jsonc
          sed -i "s/srn-d1-id-placeholder/${{ secrets.SRN_D1_ID }}/g" wrangler.jsonc
          sed -i "s/srn-r2-name-placeholder/${{ secrets.SRN_R2_NAME }}/g" wrangler.jsonc
          
          # Apply database migrations before deployment
          npx wrangler d1 migrations apply ${{ secrets.SRN_D1_NAME }} --remote --yes
          
          DEPLOY_OUTPUT=$(npx wrangler deploy)
          echo "$DEPLOY_OUTPUT"
          
          DEPLOYED_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE "https://[a-zA-Z0-9.-]+\.workers\.dev" | head -n 1)
          echo "deployed_url=$DEPLOYED_URL" >> $GITHUB_OUTPUT
          
          git ls-remote --heads origin "refs/heads/infra/provision-*" | awk '{print $2}' | sed 's|refs/heads/||' | while read branch; do
            git push origin --delete $branch || true
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- MODE B: Bootstrap ---
      - name: Infrastructure Bootstrap
        if: steps.check_secrets.outputs.mode == 'bootstrap'
        run: |
          cd worker
          TS=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="infra/provision-$TS"
          git checkout -b $BRANCH_NAME
          
          DB_NAME="srn-db-$TS"
          R2_NAME="srn-assets-$TS"
          
          npx wrangler r2 bucket create $R2_NAME &>/dev/null || true
          npx wrangler d1 create $DB_NAME &>/dev/null || true
          
          D1_ID=$(npx wrangler d1 list 2>/dev/null | grep "$DB_NAME" | grep -oE "[0-9a-f]{8}-([0-9a-f]{4}-){3}[0-9a-f]{12}" | head -n 1)
          if [ -z "$D1_ID" ]; then exit 1; fi
          
          echo "::add-mask::$D1_ID"
          sed -i "s/srn-d1-name-placeholder/$DB_NAME/g" wrangler.jsonc
          sed -i "s/srn-d1-id-placeholder/$D1_ID/g" wrangler.jsonc
          sed -i "s/srn-r2-name-placeholder/$R2_NAME/g" wrangler.jsonc
          
          npx wrangler d1 migrations apply $DB_NAME --remote --yes

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wrangler.jsonc
          git commit -m "infra: provisioning $DB_NAME and $R2_NAME"
          git push origin $BRANCH_NAME

          echo "::notice::Cloudless infrastructure provisioned on '$BRANCH_NAME'. Merge and add secrets."
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WRANGLER_NON_INTERACTIVE: "true"

      # --- MODE C: Final Sync (Docs) ---
      - name: Update Registry (README & RELAYS)
        if: success() && steps.check_secrets.outputs.mode == 'deploy' && github.ref_name == 'main'
        run: |
          DEPLOYED_URL="${{ steps.prod_deploy.outputs.deployed_url }}"
          if [ -n "$DEPLOYED_URL" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git reset --hard
            git pull --rebase origin main
            
            sed -i "s|\[pending deployment\]|$DEPLOYED_URL|g" README.md
            sed -i "/## 官方中继/,/## 社区中继/s|\[pending deployment\]|$DEPLOYED_URL|g" RELAYS.md
            
            git add README.md RELAYS.md
            git commit -m "docs: sync live relay registry [skip ci]" || echo "No changes"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
