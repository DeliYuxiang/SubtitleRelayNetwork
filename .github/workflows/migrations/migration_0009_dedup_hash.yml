name: "Backfill dedup_hash for existing Kind 1001 events"

# One-time data migration. Runs after SQL schema migration 0009_dedup_hash.sql
# has been applied (which adds the dedup_hash column + UNIQUE index).
#
# Algorithm:
#   1. Batch-fetch event_metadata rows where dedup_hash IS NULL (Kind 1001 only).
#   2. Compute MD5(pubkey|content_md5|tmdb_id|season_num|episode_num|language|archive_md5).
#   3. UPDATE OR IGNORE — if UNIQUE conflict, the row is a semantic duplicate: DELETE it.
#   4. Repeat until no rows remain.
#
# Formula must match events.ts computeDedupHash() exactly.
# After successful execution, this file is archived to .github/workflows/audit/.

script: |
  import { createHash } from 'node:crypto';

  const ACCOUNT_ID = process.env.CLOUDFLARE_ACCOUNT_ID;
  const API_TOKEN  = process.env.CLOUDFLARE_API_TOKEN;
  const DB_ID      = process.env.SRN_D1_ID;

  if (!ACCOUNT_ID || !API_TOKEN || !DB_ID) {
    console.error('Missing required env vars: CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN, SRN_D1_ID');
    process.exit(1);
  }

  const BASE = `https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/d1/database/${DB_ID}`;
  const BATCH_SIZE  = 500; // rows fetched per SELECT
  const WRITE_BATCH = 100; // max statements per /batch API call (D1 limit)

  async function d1(sql, params = []) {
    const res = await fetch(`${BASE}/query`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ sql, params }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(`D1 error: ${JSON.stringify(data.errors)}`);
    return data.result[0];
  }

  // Send multiple SQL statements in one HTTP round-trip
  async function d1batch(queries) {
    const res = await fetch(`${BASE}/batch`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ queries }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(`D1 batch error: ${JSON.stringify(data.errors)}`);
    return data.result; // array of { results, meta } — one per query
  }

  function chunk(arr, size) {
    const out = [];
    for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
    return out;
  }

  function makeDedupHash(pubkey, contentMd5, tmdbId, seasonNum, episodeNum, language, archiveMd5) {
    const key = [
      pubkey,
      contentMd5,
      String(tmdbId   ?? ''),
      String(seasonNum  ?? 0),
      String(episodeNum ?? 0),
      language   || 'und',
      archiveMd5 || '',
    ].join('|');
    return createHash('md5').update(key).digest('hex');
  }

  async function main() {
    let updated = 0;
    let removed = 0;

    while (true) {
      const { results } = await d1(`
        SELECT m.event_id, e.pubkey, e.content_md5,
               m.tmdb_id, m.season_num, m.episode_num, m.language, m.archive_md5
        FROM event_metadata m
        JOIN events e ON e.id = m.event_id
        WHERE m.dedup_hash IS NULL AND e.kind = 1001
        LIMIT ?
      `, [BATCH_SIZE]);

      if (!results?.length) break;

      // Compute all hashes locally (no I/O)
      const rows = results.map(row => ({
        event_id: row.event_id,
        hash: makeDedupHash(row.pubkey, row.content_md5, row.tmdb_id,
                            row.season_num, row.episode_num, row.language, row.archive_md5),
      }));

      // Batch all UPDATEs — one HTTP call per 100 rows instead of one per row
      const updateQueries = rows.map(({ event_id, hash }) => ({
        sql: 'UPDATE OR IGNORE event_metadata SET dedup_hash = ? WHERE event_id = ? AND dedup_hash IS NULL',
        params: [hash, event_id],
      }));
      const updateResults = [];
      for (const batch of chunk(updateQueries, WRITE_BATCH)) {
        updateResults.push(...await d1batch(batch));
      }

      // Collect duplicates (UPDATE returned 0 changes = UNIQUE conflict)
      const duplicateIds = rows
        .filter((_, i) => updateResults[i].meta.changes === 0)
        .map(r => r.event_id);

      if (duplicateIds.length > 0) {
        const deleteQueries = duplicateIds.map(id => ({
          sql: 'DELETE FROM event_metadata WHERE event_id = ? AND dedup_hash IS NULL',
          params: [id],
        }));
        for (const batch of chunk(deleteQueries, WRITE_BATCH)) {
          await d1batch(batch);
        }
        duplicateIds.forEach(id => console.log(`Discarded duplicate event: ${id}`));
      }

      updated += rows.length - duplicateIds.length;
      removed += duplicateIds.length;
      console.log(`Progress: updated=${updated}, removed=${removed}`);
    }

    console.log(`Backfill complete. Updated: ${updated}, Duplicates removed: ${removed}`);
  }

  main().catch(e => { console.error(e.message); process.exit(1); });
