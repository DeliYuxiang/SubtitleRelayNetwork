name: PR Checks & Preview Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/pr.yml'
      - '.github/workflows/deploy.yml'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Lint, format-check, and run unit tests against the local test DB.
  # ─────────────────────────────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    name: Code Check & Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd worker && npm ci

      - name: Format Check
        run: cd worker && npm run format:check

      - name: Run Tests
        run: cd worker && npm test -- --run

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to the shared preview environment (srn-worker-preview).
  # Isolated D1 + R2 — no maintenance mode, no backup, no data migrations.
  # Requires GitHub Secrets: SRN_PREVIEW_D1_NAME, SRN_PREVIEW_D1_ID, SRN_PREVIEW_R2_NAME
  # ─────────────────────────────────────────────────────────────────────────────
  preview-deploy:
    needs: check
    runs-on: ubuntu-latest
    name: Deploy to Preview
    # Skip if preview secrets are not configured (e.g. forks or before provisioning)
    if: |
      secrets.SRN_PREVIEW_D1_NAME != '' &&
      secrets.SRN_PREVIEW_D1_ID != '' &&
      secrets.SRN_PREVIEW_R2_NAME != ''
    permissions:
      pull-requests: write
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WRANGLER_NON_INTERACTIVE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd worker && npm ci

      - name: Generate wrangler preview config
        run: |
          SRN_POW_SECRET=$(openssl rand -hex 16) \
            .github/workflows/scripts/generate_wrangler_config.sh worker/wrangler.preview.jsonc --preview
        env:
          SRN_PREVIEW_D1_NAME: ${{ secrets.SRN_PREVIEW_D1_NAME }}
          SRN_PREVIEW_D1_ID: ${{ secrets.SRN_PREVIEW_D1_ID }}
          SRN_PREVIEW_R2_NAME: ${{ secrets.SRN_PREVIEW_R2_NAME }}

      - name: Apply preview schema migrations
        run: |
          cd worker
          npx wrangler d1 migrations apply ${{ secrets.SRN_PREVIEW_D1_NAME }} \
            --remote --config wrangler.preview.jsonc

      - name: Deploy to preview
        id: deploy
        run: |
          cd worker
          SHORT_SHA=$(git rev-parse --short HEAD)
          RELAY_PUBLIC_KEY="${{ secrets.RELAY_PUBLIC_KEY }}"
          DEPLOY_OUTPUT=$(npx wrangler deploy --config wrangler.preview.jsonc \
            --var COMMIT_SHA:"$SHORT_SHA" \
            --var RELAY_PUBLIC_KEY:"${RELAY_PUBLIC_KEY:-preview-key}" \
            --var SRN_POW_SECRET:"$(openssl rand -hex 16)")
          echo "$DEPLOY_OUTPUT"

          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE "https://[a-zA-Z0-9.-]+\.workers\.dev" | head -n 1)
          echo "preview_url=${PREVIEW_URL}" >> $GITHUB_OUTPUT

      - name: Post preview URL to PR
        if: steps.deploy.outputs.preview_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "Preview deployed: ${{ steps.deploy.outputs.preview_url }}

Worker: \`srn-worker-preview\` | Commit: \`$(git rev-parse --short HEAD)\`"
