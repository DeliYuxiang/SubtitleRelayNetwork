name: PR Checks & Preview Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/pr.yml'
      - '.github/workflows/deploy.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    name: Code Check & Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd worker && npm ci

      - name: Format Check
        run: cd worker && npm run format:check

      - name: Run Tests
        run: cd worker && npm test -- --run

  # ─────────────────────────────────────────────────────────────────────────────
  # Resolve preview + production resource IDs from Terraform state (in parallel).
  # Skips preview deploy automatically if preview resources don't exist yet.
  # ─────────────────────────────────────────────────────────────────────────────
  resolve-infra:
    needs: check
    uses: ./.github/workflows/resolve-infra.yml
    secrets: inherit
    with:
      environment: preview

  resolve-prod-infra:
    needs: check
    uses: ./.github/workflows/resolve-infra.yml
    secrets: inherit
    with:
      environment: production

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to the shared preview environment (srn-worker-preview).
  # Seeds preview D1 from production snapshot so tests run against real data.
  # Skipped automatically if preview resources are not yet provisioned.
  # ─────────────────────────────────────────────────────────────────────────────
  preview-deploy:
    needs: [check, resolve-infra, resolve-prod-infra]
    runs-on: ubuntu-latest
    name: Deploy to Preview
    if: needs.resolve-infra.outputs.infra_exists == 'true'
    permissions:
      pull-requests: write
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WRANGLER_NON_INTERACTIVE: "true"
      PREVIEW_D1_NAME: ${{ needs.resolve-infra.outputs.d1_name }}
      PREVIEW_D1_ID:   ${{ needs.resolve-infra.outputs.d1_id }}
      PROD_D1_NAME:    ${{ needs.resolve-prod-infra.outputs.d1_name }}
      PROD_D1_ID:      ${{ needs.resolve-prod-infra.outputs.d1_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          RELAY_PUBLIC_KEY: ${{ secrets.RELAY_PUBLIC_KEY }}
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
        run: |
          MISSING=()
          [ -z "$CLOUDFLARE_API_TOKEN"  ] && MISSING+=("CLOUDFLARE_API_TOKEN")
          [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && MISSING+=("CLOUDFLARE_ACCOUNT_ID")
          [ -z "$RELAY_PUBLIC_KEY"      ] && MISSING+=("RELAY_PUBLIC_KEY")
          [ -z "$TMDB_TOKEN"            ] && MISSING+=("TMDB_TOKEN")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd worker && npm ci

      - name: Detect migration changes
        id: detect_migrations
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }} HEAD -- worker/migrations/ | wc -l)
          echo "has_migrations=$([ "$CHANGED" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Seed preview D1 from production
        if: steps.detect_migrations.outputs.has_migrations == 'true' && needs.resolve-prod-infra.outputs.infra_exists == 'true'
        run: |
          cd worker

          # Export production D1 to a SQL dump
          echo "Exporting production D1 ($PROD_D1_NAME)..."
          npx wrangler d1 export "$PROD_D1_NAME" --remote --output /tmp/prod-dump.sql

          # Clear preview D1: query sqlite_master, drop all user tables
          echo "Clearing preview D1 ($PREVIEW_D1_NAME)..."
          D1_API="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database/$PREVIEW_D1_ID"
          QUERY_OUT=$(curl -s "$D1_API/query" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"sql":"SELECT name FROM sqlite_master WHERE type=\u0027table\u0027 AND name NOT LIKE \u0027sqlite_%\u0027","params":[]}')
          TABLES=$(echo "$QUERY_OUT" | jq -r '(.result[0].results // [])[] | .name | select(startswith("_cf_") | not)')
          if [ -n "$TABLES" ]; then
            {
              echo "PRAGMA foreign_keys=OFF;"
              for t in $TABLES; do echo "DROP TABLE IF EXISTS \"$t\";"; done
              echo "PRAGMA foreign_keys=ON;"
            } > /tmp/reset_preview.sql
            npx wrangler d1 execute "$PREVIEW_D1_NAME" --remote --file=/tmp/reset_preview.sql --yes
          fi

          # Import production dump into preview D1
          echo "Importing production dump into preview D1..."
          npx wrangler d1 execute "$PREVIEW_D1_NAME" --remote --file=/tmp/prod-dump.sql --yes
          echo "Preview D1 seeded from production."

      - name: Generate wrangler preview config
        run: |
          SRN_POW_SECRET=$(openssl rand -hex 16) \
            .github/workflows/scripts/generate_wrangler_config.sh worker/wrangler.preview.jsonc --preview
        env:
          SRN_PREVIEW_D1_NAME: ${{ needs.resolve-infra.outputs.d1_name }}
          SRN_PREVIEW_D1_ID: ${{ needs.resolve-infra.outputs.d1_id }}
          SRN_PREVIEW_R2_NAME: ${{ needs.resolve-infra.outputs.r2_name }}
          SRN_PUBKEY_WHITELIST: ${{ vars.SRN_PUBKEY_WHITELIST }}
          SRN_POW_DIFFICULTY: ${{ vars.SRN_POW_DIFFICULTY || '0' }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}

      - name: Apply preview schema migrations
        run: |
          cd worker
          npx wrangler d1 migrations apply "$PREVIEW_D1_NAME" \
            --remote --config wrangler.preview.jsonc

      - name: Run pending data migrations
        if: steps.detect_migrations.outputs.has_migrations == 'true'
        run: node worker/data-migrations/run.mjs
        env:
          SRN_D1_ID: ${{ needs.resolve-infra.outputs.d1_id }}

      - name: Deploy to preview
        id: deploy
        run: |
          cd worker
          SHORT_SHA=$(git rev-parse --short HEAD)
          RELAY_PUBLIC_KEY="${{ secrets.RELAY_PUBLIC_KEY }}"
          DEPLOY_OUTPUT=$(npx wrangler deploy --config wrangler.preview.jsonc \
            --var COMMIT_SHA:"$SHORT_SHA" \
            --var RELAY_PUBLIC_KEY:"${RELAY_PUBLIC_KEY:-preview-key}" \
            --var SRN_POW_SECRET:"$(openssl rand -hex 16)")
          echo "$DEPLOY_OUTPUT"

          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE "https://[a-zA-Z0-9.-]+\.workers\.dev" | head -n 1)
          echo "preview_url=${PREVIEW_URL}" >> $GITHUB_OUTPUT

      - name: Inject preview secrets
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
        run: |
          cd worker
          if [ -n "$TMDB_TOKEN" ]; then
            printf '%s' "$TMDB_TOKEN" | npx wrangler secret put TMDB_TOKEN \
              --config wrangler.preview.jsonc
          fi

      - name: Post preview URL to PR
        if: steps.deploy.outputs.preview_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          PREVIEW_URL="${{ steps.deploy.outputs.preview_url }}"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$(printf 'Preview deployed: %s\n\nWorker: `srn-worker-preview` | Commit: `%s`' "$PREVIEW_URL" "$SHORT_SHA")"
