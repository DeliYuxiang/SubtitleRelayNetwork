name: Rollback D1 Database

on:
  workflow_dispatch:
    inputs:
      backup_file:
        description: 'Backup filename in R2 (leave empty for latest)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: read

jobs:
  resolve-infra:
    uses: ./.github/workflows/resolve-infra.yml
    secrets: inherit
    with:
      environment: production

  rollback:
    needs: [resolve-infra]
    name: Database Rollback
    runs-on: ubuntu-latest
    env:
      SRN_D1_NAME:        ${{ needs.resolve-infra.outputs.d1_name }}
      SRN_D1_ID:          ${{ needs.resolve-infra.outputs.d1_id }}
      SRN_R2_NAME:        ${{ needs.resolve-infra.outputs.r2_name }}
      SRN_BACKUP_R2_NAME: ${{ needs.resolve-infra.outputs.backup_r2_name }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: cd worker && npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Identify and Download Backup
        id: fetch_backup
        run: |
          BACKUP_FILE="${{ github.event.inputs.backup_file }}"

          if [ "$BACKUP_FILE" = "latest" ]; then
            echo "Searching for latest backup in $SRN_BACKUP_R2_NAME..."
            LATEST=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/$SRN_BACKUP_R2_NAME/objects?prefix=backup-" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              | jq -r '.result.objects | sort_by(.key) | last | .key')
            if [ "$LATEST" = "null" ] || [ -z "$LATEST" ]; then exit 1; fi
            BACKUP_FILE=$LATEST
          fi

          COMMIT_SHA=$(echo "$BACKUP_FILE" | grep -oE "[a-f0-9]{7}" | tail -n 1)
          echo "Target backup: $BACKUP_FILE (Commit: $COMMIT_SHA)"
          echo "file_name=$BACKUP_FILE" >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT

          cd worker
          npx wrangler r2 object get "$SRN_BACKUP_R2_NAME/$BACKUP_FILE" --file rollback.sql

      - name: Generate wrangler production config
        run: |
          SRN_POW_SECRET=$(openssl rand -hex 16) \
            .github/workflows/scripts/generate_wrangler_config.sh worker/wrangler.production.jsonc
        env:
          SRN_PUBKEY_WHITELIST: ${{ vars.SRN_PUBKEY_WHITELIST }}
          SRN_POW_DIFFICULTY: ${{ vars.SRN_POW_DIFFICULTY || '0' }}
          WRANGLER_NON_INTERACTIVE: "true"

      - name: Restore Database
        run: |
          echo "::warning::Restoring D1 from backup: ${{ steps.fetch_backup.outputs.file_name }}"
          cd worker
          npx wrangler d1 execute "$SRN_D1_NAME" --remote --file=rollback.sql --yes \
            --config wrangler.production.jsonc

      - name: Rollback Code
        if: steps.fetch_backup.outputs.commit_sha != ''
        run: |
          PREV_SHA="${{ steps.fetch_backup.outputs.commit_sha }}"
          echo "::warning::Rolling back code to $PREV_SHA..."
          git checkout "$PREV_SHA"
          cd worker
          npm ci
          npx wrangler deploy --config wrangler.production.jsonc --var MAINTENANCE_MODE:false
          echo "::notice::Code successfully rolled back to $PREV_SHA"
        env:
          WRANGLER_NON_INTERACTIVE: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
