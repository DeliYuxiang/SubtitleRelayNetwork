name: Terraform IaC

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'

defaults:
  run:
    working-directory: infra/terraform

jobs:
  terraform:
    runs-on: ubuntu-latest
    name: Terraform Plan / Apply

    permissions:
      contents: read
      pull-requests: write    # for posting plan as PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="endpoint=https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            -backend-config="access_key=${{ secrets.TF_R2_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ secrets.TF_R2_SECRET_ACCESS_KEY }}"
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan
          # Check whether the B2 application key will be created or replaced.
          # Only when it changes do we need to re-push Worker secrets.
          B2_KEY_ACTIONS=$(terraform show -json tfplan 2>/dev/null \
            | jq -r '[.resource_changes[]?
                | select(.address == "b2_application_key.worker")
                | .change.actions[]]
              | length' 2>/dev/null || echo "0")
          if [ "$B2_KEY_ACTIONS" -gt 0 ]; then
            echo "b2_key_changed=true"  >> $GITHUB_OUTPUT
          else
            echo "b2_key_changed=false" >> $GITHUB_OUTPUT
          fi
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_production_d1_name: ${{ vars.TF_PRODUCTION_D1_NAME || 'srn-db-prod' }}
          TF_VAR_production_r2_name: ${{ vars.TF_PRODUCTION_R2_NAME || 'srn-assets-prod' }}
          TF_VAR_production_backup_r2_name: ${{ vars.TF_PRODUCTION_BACKUP_R2_NAME || 'srn-backup-prod' }}
          TF_VAR_preview_d1_name: ${{ vars.TF_PREVIEW_D1_NAME || 'srn-db-preview' }}
          TF_VAR_preview_r2_name: ${{ vars.TF_PREVIEW_R2_NAME || 'srn-assets-preview' }}
          TF_VAR_b2_bucket_name: ${{ vars.TF_B2_BUCKET_NAME || 'srn-backup-prod' }}
          TF_VAR_b2_region: ${{ vars.TF_B2_REGION }}
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_MASTER_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_MASTER_APP_KEY }}

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const plan = execSync('terraform show -no-color tfplan', { cwd: `${process.env.GITHUB_WORKSPACE}/infra/terraform` }).toString();
            const body = `## Terraform Plan\n\`\`\`\n${plan.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_production_d1_name: ${{ vars.TF_PRODUCTION_D1_NAME || 'srn-db-prod' }}
          TF_VAR_production_r2_name: ${{ vars.TF_PRODUCTION_R2_NAME || 'srn-assets-prod' }}
          TF_VAR_production_backup_r2_name: ${{ vars.TF_PRODUCTION_BACKUP_R2_NAME || 'srn-backup-prod' }}
          TF_VAR_preview_d1_name: ${{ vars.TF_PREVIEW_D1_NAME || 'srn-db-preview' }}
          TF_VAR_preview_r2_name: ${{ vars.TF_PREVIEW_R2_NAME || 'srn-assets-preview' }}
          TF_VAR_b2_bucket_name: ${{ vars.TF_B2_BUCKET_NAME || 'srn-backup-prod' }}
          TF_VAR_b2_region: ${{ vars.TF_B2_REGION }}
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_MASTER_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_MASTER_APP_KEY }}

      - name: Push B2 Worker Secrets to Cloudflare
        if: github.event_name == 'push' && github.ref_name == 'main' && steps.plan.outputs.b2_key_changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_b2_bucket_name: ${{ vars.TF_B2_BUCKET_NAME || 'srn-backup-prod' }}
          TF_VAR_b2_region: ${{ vars.TF_B2_REGION }}
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_MASTER_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_MASTER_APP_KEY }}
          WRANGLER_NON_INTERACTIVE: "true"
        run: |
          B2_KEY_ID=$(terraform output -raw b2_worker_key_id 2>/dev/null || echo "")
          B2_APP_KEY=$(terraform output -raw b2_worker_app_key 2>/dev/null || echo "")
          B2_BUCKET=$(terraform output -raw b2_bucket_name 2>/dev/null || echo "")
          B2_ENDPOINT=$(terraform output -raw b2_endpoint 2>/dev/null || echo "")

          if [ -z "$B2_KEY_ID" ] || [ -z "$B2_APP_KEY" ] || [ -z "$B2_ENDPOINT" ]; then
            echo "::notice::B2 outputs not available — skipping Worker secret push"
            exit 0
          fi

          # Mask before any logging
          echo "::add-mask::$B2_KEY_ID"
          echo "::add-mask::$B2_APP_KEY"

          cd "$GITHUB_WORKSPACE/worker"
          npm ci --silent

          printf '%s' "$B2_KEY_ID"   | npx wrangler secret put B2_KEY_ID
          printf '%s' "$B2_APP_KEY"  | npx wrangler secret put B2_APP_KEY
          printf '%s' "$B2_ENDPOINT" | npx wrangler secret put B2_ENDPOINT
          printf '%s' "$B2_BUCKET"   | npx wrangler secret put B2_BUCKET_NAME

          echo "::notice::B2 worker secrets pushed to Cloudflare Worker"

      - name: Show Outputs
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: terraform output
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_b2_bucket_name: ${{ vars.TF_B2_BUCKET_NAME || 'srn-backup-prod' }}
          TF_VAR_b2_region: ${{ vars.TF_B2_REGION }}
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_MASTER_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_MASTER_APP_KEY }}
