name: Terraform IaC

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'

defaults:
  run:
    working-directory: infra/terraform

jobs:
  terraform:
    runs-on: ubuntu-latest
    name: Terraform Plan / Apply

    permissions:
      contents: read
      pull-requests: write    # for posting plan as PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="endpoint=https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            -backend-config="access_key=${{ secrets.TF_R2_ACCESS_KEY_ID }}" \
            -backend-config="secret_key=${{ secrets.TF_R2_SECRET_ACCESS_KEY }}"
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_production_d1_name: ${{ vars.TF_PRODUCTION_D1_NAME || 'srn-db-prod' }}
          TF_VAR_production_r2_name: ${{ vars.TF_PRODUCTION_R2_NAME || 'srn-assets-prod' }}
          TF_VAR_production_backup_r2_name: ${{ vars.TF_PRODUCTION_BACKUP_R2_NAME || 'srn-backup-prod' }}
          TF_VAR_preview_d1_name: ${{ vars.TF_PREVIEW_D1_NAME || 'srn-db-preview' }}
          TF_VAR_preview_r2_name: ${{ vars.TF_PREVIEW_R2_NAME || 'srn-assets-preview' }}
          TF_VAR_backup_retention_days: ${{ vars.SRN_BACKUP_RETENTION_DAYS || '90' }}

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const plan = execSync('terraform show -no-color tfplan', { cwd: `${process.env.GITHUB_WORKSPACE}/infra/terraform` }).toString();
            const body = `## Terraform Plan\n\`\`\`\n${plan.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_production_d1_name: ${{ vars.TF_PRODUCTION_D1_NAME || 'srn-db-prod' }}
          TF_VAR_production_r2_name: ${{ vars.TF_PRODUCTION_R2_NAME || 'srn-assets-prod' }}
          TF_VAR_production_backup_r2_name: ${{ vars.TF_PRODUCTION_BACKUP_R2_NAME || 'srn-backup-prod' }}
          TF_VAR_preview_d1_name: ${{ vars.TF_PREVIEW_D1_NAME || 'srn-db-preview' }}
          TF_VAR_preview_r2_name: ${{ vars.TF_PREVIEW_R2_NAME || 'srn-assets-preview' }}
          TF_VAR_backup_retention_days: ${{ vars.SRN_BACKUP_RETENTION_DAYS || '90' }}

      - name: Show Outputs
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: terraform output
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
